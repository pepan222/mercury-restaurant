{% extends 'dashboard/base.html' %}

{% block title %}Добавить подкатегорию | Админ-панель Меркурий{% endblock %}

{% block content %}
<div class="page-header">
    <h2>📂 Добавление новой подкатегории</h2>
    <a href="{% url 'dashboard:subcategories' %}" class="btn btn-primary">← Назад к подкатегориям</a>
</div>

<div style="max-width: 600px; margin: 0 auto;">
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Категория *</label>
            <select name="category_id" class="form-control" required>
                <option value="">Выберите категорию</option>
                {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>Название подкатегории *</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label>Порядок сортировки</label>
            <input type="number" name="order" class="form-control" value="0">
            <small style="color: #666;">Чем меньше число, тем выше в списке</small>
        </div>
        
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{% url 'dashboard:subcategories' %}" class="btn" style="background: #6c757d; color: white;">Отмена</a>
    </form>
</div>
{% endblock %}

{% extends 'dashboard/base.html' %}

{% block title %}Редактировать столик | Админ-панель Меркурий{% endblock %}

{% block content %}
<div class="page-header">
    <h2>✏️ Редактировать столик №{{ table.table_number }}</h2>
    <a href="{% url 'dashboard:tables' %}" class="btn btn-secondary">← Назад</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="table_number">Номер стола *</label>
                <input type="number" name="table_number" id="table_number" class="form-control" value="{{ table.table_number }}" required>
            </div>
            <div class="form-group">
                <label for="seats">Количество мест *</label>
                <input type="number" name="seats" id="seats" class="form-control" min="1" max="20" value="{{ table.seats }}" required>
            </div>
            <div class="form-group">
                <label for="location">Расположение</label>
                <input type="text" name="location" id="location" class="form-control" value="{{ table.location }}">
            </div>
            <div class="form-group form-check">
                <input type="checkbox" name="is_active" id="is_active" class="form-check-input" {% if table.is_active %}checked{% endif %}>
                <label for="is_active" class="form-check-label">Активен</label>
            </div>
            <button type="submit" class="btn btn-primary">Сохранить изменения</button>
        </form>
    </div>
</div>
{% endblock %}

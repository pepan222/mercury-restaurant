{% extends 'base.html' %}
{% load static %}

{% block meta %}
    {{ block.super }}
    <meta name="description" content="Фотогалерея ресторана Меркурий: интерьер залов, летняя веранда, банкетный зал, наши блюда и атмосфера.">
    <meta property="og:title" content="Галерея | Ресторан Меркурий – фото интерьера и блюд">
    <meta property="og:description" content="Посмотрите на уютную атмосферу нашего ресторана, банкетные залы и кулинарные шедевры. Вдохновляйтесь перед визитом.">
    <meta property="og:url" content="https://mercury-restaurant.ru/gallery/">
    <link rel="canonical" href="https://mercury-restaurant.ru/gallery/">
{% endblock %}

{% block title %}Галерея | Ресторан Меркурий{% endblock %}

{% block extra_css %}
<style>
    /* Дополнительные стили для галереи с адаптацией */
    .gallery-page h1 {
        margin-bottom: 30px;
        font-size: 2.2rem;
    }
    
    .gallery-page .gallery-description {
        margin-bottom: 40px;
        font-size: 1.1rem;
        line-height: 1.5;
    }
    
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }
    
    .gallery-item {
        aspect-ratio: 1;
        background: var(--primary-dark-gray);
        border-radius: 8px;
        overflow: hidden;
    }
    
    .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s;
    }
    
    .gallery-item:hover img {
        transform: scale(1.05);
    }
    
    /* Адаптация для планшетов */
    @media (max-width: 992px) {
        .gallery-grid {
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        
        .gallery-page h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }
        
        .gallery-page .gallery-description {
            font-size: 1rem;
            margin-bottom: 30px;
        }
    }
    
    /* Адаптация для мобильных (768px и меньше) */
    @media (max-width: 768px) {
        .gallery-grid {
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .gallery-page h1 {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }
        
        .gallery-page .gallery-description {
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
    }
    
    /* Адаптация для маленьких телефонов (576px) */
    @media (max-width: 576px) {
        .gallery-grid {
            gap: 10px;
        }
        
        .gallery-page h1 {
            font-size: 1.3rem;
            margin-bottom: 12px;
        }
        
        .gallery-page .gallery-description {
            font-size: 0.85rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }
    }
    
    /* Адаптация для очень маленьких телефонов (480px) */
    @media (max-width: 480px) {
        .gallery-grid {
            gap: 8px;
        }
        
        .gallery-page h1 {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        
        .gallery-page .gallery-description {
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
    }
    
    /* Адаптация для супер маленьких телефонов (380px) */
    @media (max-width: 380px) {
        .gallery-grid {
            gap: 6px;
        }
        
        .gallery-page h1 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        
        .gallery-page .gallery-description {
            font-size: 0.75rem;
            margin-bottom: 12px;
        }
    }
    
    /* Адаптация для экстремально маленьких телефонов (320px) */
    @media (max-width: 320px) {
        .gallery-grid {
            gap: 5px;
        }
        
        .gallery-page h1 {
            font-size: 1rem;
            margin-bottom: 6px;
        }
        
        .gallery-page .gallery-description {
            font-size: 0.7rem;
            margin-bottom: 10px;
            line-height: 1.3;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="section gallery-page">
    <div class="container">
        <h1>Галерея</h1>
        <p class="gallery-description">Атмосфера нашего ресторана и наши кулинарные шедевры</p>
        
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="{% static 'images/1.webp' %}" alt="Вид снаружи главного входа Меркурий">
            </div>
            <div class="gallery-item">
                <img src="{% static 'images/2.webp' %}" alt="Блюдо кавказской кухни">
            </div>
            <div class="gallery-item">
                <img src="{% static 'images/3.webp' %}" alt="Лестница на второй этаж">
            </div>
            <div class="gallery-item">
                <img src="{% static 'images/4.webp' %}" alt="Тарелка закусок">
            </div>
            <div class="gallery-item">
                <img src="{% static 'images/5.webp' %}" alt="Интерьер зала на втором этаже">
            </div>
            <div class="gallery-item">
                <img src="{% static 'images/6.webp' %}" alt="Вид на ресторан с лицевой стороны + парковка">
            </div>
            <div class="gallery-item">
                <img src="{% static 'images/7.webp' %}" alt="Интерьер зала на первом этаже">
            </div>
            <div class="gallery-item">
                <img src="{% static 'images/8.webp' %}" alt="Уютная атмосфера в беседке Меркурий">
            </div>
        </div>
    </div>
</section>
{% endblock %}

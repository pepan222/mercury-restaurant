{% extends 'base.html' %}

{% block title %}Редактировать профиль | Ресторан Меркурий{% endblock %}

{% block extra_css %}
<style>
    /* ========== СТИЛИ ДЛЯ СТРАНИЦЫ РЕДАКТИРОВАНИЯ ПРОФИЛЯ ========== */
    
    .edit-profile-page {
        padding: 40px 20px;
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .edit-profile-container {
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
    }
    
    .edit-profile-card {
        background: var(--white);
        border-radius: 20px;
        box-shadow: var(--shadow);
        overflow: hidden;
        transition: transform 0.3s, box-shadow 0.3s;
        width: 100%;
    }
    
    .edit-profile-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }
    
    .edit-profile-header {
        background: linear-gradient(135deg, var(--primary-burgundy), #4a0010);
        padding: 30px;
        text-align: center;
        color: var(--white);
    }
    
    .edit-profile-header h2 {
        margin: 0;
        font-size: 1.5rem;
        color: var(--white);
    }
    
    .edit-profile-header h2:after {
        display: none;
    }
    
    .edit-profile-body {
        padding: 30px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text-dark);
        font-size: 0.9rem;
    }
    
    .form-control {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid var(--border-light);
        border-radius: 8px;
        font-size: 0.95rem;
        transition: all 0.3s;
        background: var(--white);
        box-sizing: border-box;
    }
    
    .form-control:focus {
        outline: none;
        border-color: var(--primary-gold);
        box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.1);
    }
    
    .form-control[readonly] {
        background: #f5f5f5;
        cursor: not-allowed;
    }
    
    .form-text {
        display: block;
        margin-top: 5px;
        font-size: 0.75rem;
        color: var(--text-light);
    }
    
    textarea.form-control {
        resize: vertical;
        min-height: 80px;
    }
    
    .btn-save {
        width: 100%;
        padding: 12px;
        font-size: 1rem;
        font-weight: 600;
        margin-top: 10px;
    }
    
    .back-link {
        text-align: center;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid var(--border-light);
    }
    
    .back-link a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--primary-burgundy);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s;
        padding: 8px 16px;
        border-radius: 8px;
    }
    
    .back-link a:hover {
        background: rgba(128, 0, 32, 0.05);
        transform: translateX(-5px);
    }
    
    .back-link a::before {
        content: '←';
        font-size: 1.1rem;
        transition: transform 0.3s;
    }
    
    .back-link a:hover::before {
        transform: translateX(-3px);
    }
    
    /* ========== АДАПТИВНОСТЬ ========== */
    
    /* Планшеты (768px - 1000px) */
    @media (max-width: 768px) {
        .edit-profile-page {
            padding: 30px 20px;
        }
        
        .edit-profile-container {
            max-width: 450px;
        }
        
        .edit-profile-header {
            padding: 25px;
        }
        
        .edit-profile-header h2 {
            font-size: 1.3rem;
        }
        
        .edit-profile-body {
            padding: 25px;
        }
        
        .form-group label {
            font-size: 0.85rem;
        }
        
        .form-control {
            padding: 10px 12px;
            font-size: 0.9rem;
        }
        
        .btn-save {
            padding: 10px;
            font-size: 0.95rem;
        }
        
        .back-link a {
            font-size: 0.9rem;
        }
    }
    
    /* Маленькие телефоны (540px - 768px) */
    @media (max-width: 540px) {
        .edit-profile-page {
            padding: 25px 15px;
        }
        
        .edit-profile-container {
            max-width: 100%;
        }
        
        .edit-profile-header {
            padding: 20px;
        }
        
        .edit-profile-header h2 {
            font-size: 1.2rem;
        }
        
        .edit-profile-body {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        
        .form-control {
            padding: 9px 12px;
            font-size: 0.85rem;
        }
        
        .form-text {
            font-size: 0.7rem;
        }
        
        .btn-save {
            padding: 10px;
            font-size: 0.9rem;
        }
        
        .back-link {
            margin-top: 20px;
            padding-top: 18px;
        }
        
        .back-link a {
            font-size: 0.85rem;
            padding: 6px 12px;
        }
    }
    
    /* Мобильные телефоны (480px - 540px) */
    @media (max-width: 480px) {
        .edit-profile-page {
            padding: 20px 12px;
        }
        
        .edit-profile-header {
            padding: 18px;
        }
        
        .edit-profile-header h2 {
            font-size: 1.1rem;
        }
        
        .edit-profile-body {
            padding: 18px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            font-size: 0.75rem;
        }
        
        .form-control {
            padding: 8px 10px;
            font-size: 0.8rem;
        }
        
        .form-text {
            font-size: 0.65rem;
        }
        
        .btn-save {
            padding: 8px;
            font-size: 0.85rem;
        }
        
        .back-link {
            margin-top: 18px;
            padding-top: 15px;
        }
        
        .back-link a {
            font-size: 0.8rem;
            padding: 5px 10px;
        }
    }
    
    /* Очень маленькие телефоны (400px - 480px) */
    @media (max-width: 400px) {
        .edit-profile-page {
            padding: 15px 10px;
        }
        
        .edit-profile-header h2 {
            font-size: 1rem;
        }
        
        .edit-profile-body {
            padding: 15px;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        .form-group label {
            font-size: 0.7rem;
            margin-bottom: 4px;
        }
        
        .form-control {
            padding: 7px 8px;
            font-size: 0.75rem;
        }
        
        .btn-save {
            padding: 7px;
            font-size: 0.8rem;
        }
        
        .back-link a {
            font-size: 0.75rem;
        }
    }
    
    /* Экстремально маленькие телефоны (320px - 400px) */
    @media (max-width: 360px) {
        .edit-profile-page {
            padding: 12px 8px;
        }
        
        .edit-profile-header {
            padding: 15px;
        }
        
        .edit-profile-header h2 {
            font-size: 0.95rem;
        }
        
        .edit-profile-body {
            padding: 12px;
        }
        
        .form-group {
            margin-bottom: 10px;
        }
        
        .form-group label {
            font-size: 0.65rem;
        }
        
        .form-control {
            padding: 6px 8px;
            font-size: 0.7rem;
            border-radius: 6px;
        }
        
        .form-text {
            font-size: 0.6rem;
        }
        
        .btn-save {
            padding: 6px;
            font-size: 0.75rem;
        }
        
        .back-link {
            margin-top: 15px;
            padding-top: 12px;
        }
        
        .back-link a {
            font-size: 0.7rem;
            padding: 4px 8px;
        }
        
        .back-link a::before {
            font-size: 0.9rem;
        }
    }
    
    /* Супер маленькие телефоны (до 320px) */
    @media (max-width: 320px) {
        .edit-profile-page {
            padding: 10px 6px;
        }
        
        .edit-profile-header {
            padding: 12px;
        }
        
        .edit-profile-header h2 {
            font-size: 0.9rem;
        }
        
        .edit-profile-body {
            padding: 10px;
        }
        
        .form-group {
            margin-bottom: 8px;
        }
        
        .form-group label {
            font-size: 0.6rem;
            margin-bottom: 3px;
        }
        
        .form-control {
            padding: 5px 6px;
            font-size: 0.65rem;
            border-radius: 5px;
        }
        
        .form-text {
            font-size: 0.55rem;
        }
        
        .btn-save {
            padding: 5px;
            font-size: 0.7rem;
        }
        
        .back-link {
            margin-top: 12px;
            padding-top: 10px;
        }
        
        .back-link a {
            font-size: 0.65rem;
            padding: 3px 6px;
        }
        
        .back-link a::before {
            font-size: 0.8rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="edit-profile-page">
    <div class="edit-profile-container">
        <div class="edit-profile-card">
            <div class="edit-profile-header">
                <h2>Редактирование профиля</h2>
            </div>
            
            <div class="edit-profile-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}" placeholder="Введите ваше имя">
                    </div>
                    
                    <div class="form-group">
                        <label>Фамилия</label>
                        <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}" placeholder="Введите вашу фамилию">
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}" readonly>
                        <span class="form-text">Email нельзя изменить</span>
                    </div>
                    
                    <div class="form-group">
                        <label>Телефон</label>
                        <input type="tel" name="phone" class="form-control" value="{{ user.profile.phone|default:'' }}" placeholder="+7 (999) 123-45-67">
                    </div>
                    
                    <div class="form-group">
                        <label>Адрес доставки</label>
                        <textarea name="address" class="form-control" rows="3" placeholder="Введите ваш адрес доставки">{{ user.profile.address|default:'' }}</textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-save">Сохранить изменения</button>
                </form>
                
                <div class="back-link">
                    <a href="{% url 'users:profile' %}">Вернуться в профиль</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Вход | Ресторан Меркурий{% endblock %}

{% block extra_css %}
<style>
    /* Стили для страницы входа */
    .login-page {
        padding: 60px 0;
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .login-container {
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
        animation: fadeInUp 0.5s ease;
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .login-card {
        background: var(--white);
        border-radius: 20px;
        box-shadow: var(--shadow);
        overflow: hidden;
        transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .login-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }
    
    .login-header {
        background: linear-gradient(135deg, var(--primary-burgundy), #4a0010);
        padding: 30px;
        text-align: center;
        color: var(--white);
    }
    
    .login-header h2 {
        margin: 0;
        font-size: 1.5rem;
        color: var(--white);
    }
    
    .login-header h2:after {
        display: none;
    }
    
    .login-body {
        padding: 30px;
    }
    
    .error-message {
        background: #ffebee;
        color: #f44336;
        padding: 12px 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 0.85rem;
        border-left: 3px solid #f44336;
        animation: shake 0.3s ease;
    }
    
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text-dark);
        font-size: 0.9rem;
    }
    
    .form-control {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid var(--border-light);
        border-radius: 8px;
        font-size: 0.95rem;
        transition: all 0.3s;
        background: var(--white);
        box-sizing: border-box;
    }
    
    .form-control:focus {
        outline: none;
        border-color: var(--primary-gold);
        box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.1);
    }
    
    .btn-login {
        width: 100%;
        padding: 12px;
        font-size: 1rem;
        font-weight: 600;
        margin-top: 10px;
    }
    
    .home-link {
        text-align: center;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid var(--border-light);
    }
    
    .home-link a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--primary-burgundy);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 0.9rem;
    }
    
    .home-link a:hover {
        background: rgba(128, 0, 32, 0.05);
        transform: translateX(-5px);
    }
    
    .home-link a::before {
        content: '←';
        font-size: 1.1rem;
        transition: transform 0.3s;
    }
    
    .home-link a:hover::before {
        transform: translateX(-3px);
    }
    
    /* ========== АДАПТИВНОСТЬ ========== */
    
    /* Планшеты (768px - 1000px) */
    @media (max-width: 768px) {
        .login-page {
            padding: 50px 20px;
        }
        
        .login-container {
            max-width: 380px;
        }
        
        .login-header {
            padding: 25px;
        }
        
        .login-header h2 {
            font-size: 1.3rem;
        }
        
        .login-body {
            padding: 25px;
        }
        
        .form-group label {
            font-size: 0.85rem;
        }
        
        .form-control {
            padding: 10px 12px;
            font-size: 0.9rem;
        }
        
        .btn-login {
            padding: 10px;
            font-size: 0.95rem;
        }
        
        .home-link a {
            font-size: 0.85rem;
            padding: 6px 12px;
        }
    }
    
    /* Маленькие телефоны (540px - 768px) */
    @media (max-width: 540px) {
        .login-page {
            padding: 40px 15px;
        }
        
        .login-container {
            max-width: 100%;
        }
        
        .login-header {
            padding: 20px;
        }
        
        .login-header h2 {
            font-size: 1.2rem;
        }
        
        .login-body {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        
        .form-control {
            padding: 9px 12px;
            font-size: 0.85rem;
        }
        
        .btn-login {
            padding: 10px;
            font-size: 0.9rem;
        }
        
        .home-link {
            margin-top: 20px;
            padding-top: 18px;
        }
        
        .home-link a {
            font-size: 0.85rem;
            padding: 6px 12px;
        }
    }
    
    /* Мобильные телефоны (480px - 540px) */
    @media (max-width: 480px) {
        .login-page {
            padding: 30px 12px;
        }
        
        .login-header {
            padding: 18px;
        }
        
        .login-header h2 {
            font-size: 1.1rem;
        }
        
        .login-body {
            padding: 18px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            font-size: 0.75rem;
        }
        
        .form-control {
            padding: 8px 10px;
            font-size: 0.8rem;
        }
        
        .btn-login {
            padding: 8px;
            font-size: 0.85rem;
        }
        
        .home-link {
            margin-top: 18px;
            padding-top: 15px;
        }
        
        .home-link a {
            font-size: 0.8rem;
            padding: 5px 10px;
        }
        
        .home-link a::before {
            font-size: 0.9rem;
        }
    }
    
    /* Очень маленькие телефоны (400px - 480px) */
    @media (max-width: 400px) {
        .login-header h2 {
            font-size: 1rem;
        }
        
        .login-body {
            padding: 15px;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        .form-group label {
            font-size: 0.7rem;
            margin-bottom: 4px;
        }
        
        .form-control {
            padding: 7px 8px;
            font-size: 0.75rem;
        }
        
        .btn-login {
            padding: 7px;
            font-size: 0.8rem;
        }
        
        .home-link a {
            font-size: 0.75rem;
            padding: 4px 8px;
        }
    }
    
    /* Экстремально маленькие телефоны (320px - 400px) */
    @media (max-width: 360px) {
        .login-page {
            padding: 25px 10px;
        }
        
        .login-header {
            padding: 15px;
        }
        
        .login-header h2 {
            font-size: 0.95rem;
        }
        
        .login-body {
            padding: 12px;
        }
        
        .form-group {
            margin-bottom: 10px;
        }
        
        .form-group label {
            font-size: 0.65rem;
        }
        
        .form-control {
            padding: 6px 8px;
            font-size: 0.7rem;
            border-radius: 6px;
        }
        
        .btn-login {
            padding: 6px;
            font-size: 0.75rem;
        }
        
        .home-link {
            margin-top: 15px;
            padding-top: 12px;
        }
        
        .home-link a {
            font-size: 0.7rem;
            padding: 4px 8px;
        }
        
        .home-link a::before {
            font-size: 0.9rem;
        }
    }
    
    /* Супер маленькие телефоны (до 320px) */
    @media (max-width: 320px) {
        .login-page {
            padding: 20px 8px;
        }
        
        .login-header {
            padding: 12px;
        }
        
        .login-header h2 {
            font-size: 0.9rem;
        }
        
        .login-body {
            padding: 10px;
        }
        
        .form-group {
            margin-bottom: 8px;
        }
        
        .form-group label {
            font-size: 0.6rem;
            margin-bottom: 3px;
        }
        
        .form-control {
            padding: 5px 6px;
            font-size: 0.65rem;
            border-radius: 5px;
        }
        
        .btn-login {
            padding: 5px;
            font-size: 0.7rem;
        }
        
        .home-link {
            margin-top: 12px;
            padding-top: 10px;
        }
        
        .home-link a {
            font-size: 0.65rem;
            padding: 3px 6px;
        }
        
        .home-link a::before {
            font-size: 0.8rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Вход в систему</h2>
            </div>
            
            <div class="login-body">
                {% if form.errors %}
                <div class="error-message">
                    Неверное имя пользователя или пароль
                </div>
                {% endif %}
                
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Имя пользователя</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-login">Войти</button>
                </form>
                
                <div class="home-link">
                    <a href="{% url 'core:home' %}">На главную</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
